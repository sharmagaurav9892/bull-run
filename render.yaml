# Render.com blueprint: one-click deploy of the Bull Run service.
#
# Usage:
#   1. Push this repo to GitHub.
#   2. In Render: New + → Blueprint → connect this repo.
#   3. Render reads this file and spins up the web service automatically.
services:
  - type: web
    name: bull-run
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /api/health
